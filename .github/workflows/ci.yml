# Test CI — runs the pytest suite (unit + integration) on every push to
# main and every PR. puffo-agent's tests are self-contained (isolated
# per-test homes, SQLite, a mocked relay), so there's no live-server e2e
# stage and no services to stand up — the pytest run is the gate.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the test job only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen  # the PySide6 UI tests render headless
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      # PySide6 (desktop UI tests) dlopens libEGL/libGL even under the
      # offscreen platform; bare runners don't ship them.
      - name: system libs for headless Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # [dev] pulls pytest + pytest-asyncio; without pytest-asyncio every
      # async test silently skips and the suite passes vacuously.
      - name: install (with dev extras)
        run: pip install -e ".[dev]"

      # Smoke: the console script + CLI load against the installed package.
      - name: smoke — CLI loads
        run: |
          puffo-agent version
          puffo-agent --help > /dev/null

      - name: pytest
        run: pytest -p no:warnings

  # Slim-import gate: the cloud runtime must install + import with ONLY
  # thin deps (aiohttp + pyyaml + puffo-agent-core). A clean env, NO fat
  # extras, NO pyside6 / psutil / fat puffo_agent — if any leak in, the
  # `import puffo_agent_cloud.__main__` below fails and the gate is red.
  slim-import:
    name: slim-import (cloud thin-deps gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Both paths in one command so the cloud package's puffo-agent-core
      # dependency resolves to the local member, not PyPI. No fat package.
      - name: install thin packages only
        run: pip install ./packages/puffo-agent-core ./packages/puffo-agent-cloud

      - name: import puffo_agent_cloud (THE gate)
        run: python -c "import puffo_agent_cloud.__main__"

      # Belt-and-suspenders: assert the heavy/fat modules are genuinely
      # absent, so the gate above can't pass with them silently present.
      - name: assert fat modules absent
        run: |
          python - <<'PY'
          import importlib.util
          for mod in ("puffo_agent", "psutil", "PySide6"):
              assert importlib.util.find_spec(mod) is None, f"{mod} leaked into the slim env"
          print("slim env confirmed: no puffo_agent / psutil / PySide6")
          PY
