# Publish the two split workspace packages — puffo-agent-core and
# puffo-agent-cloud — on every GitHub Release (and on demand via the
# Actions "Run workflow" button). Separate from the fat puffo-agent
# workflows (publish-pypi.yml / publish-testpypi.yml), which are left
# untouched: those bind to the `pypi` / `testpypi` environments and the
# `puffo-agent` PyPI project, this one owns the two split packages.
#
# Two delivery paths, by design:
#
#   1. GitHub Release assets — ALWAYS runs, ZERO external setup. `uv
#      build` produces standalone wheels + sdists which are attached to
#      the Release using the built-in GITHUB_TOKEN. Installable straight
#      from the release with no PyPI project in existence:
#        pip install \
#          https://github.com/puffo-ai/puffo-agent/releases/download/<tag>/puffo_agent_cloud-1.0.3-py3-none-any.whl
#      or point pip at the release's asset listing:
#        pip install puffo-agent-cloud puffo-agent-core \
#          --find-links https://github.com/puffo-ai/puffo-agent/releases/expanded_assets/<tag>
#
#   2. PyPI Trusted Publishing — GATED, INERT until configured. The
#      `pypi-core` / `pypi-cloud` jobs run only when the repo variable
#      PUBLISH_PYPI is set to 'true' (Settings → Secrets and variables →
#      Actions → Variables). Until then they are SKIPPED — so a release
#      stays green even though no PyPI project / publisher exists yet.
#
# One-time setup before flipping PUBLISH_PYPI=true (see packages/PUBLISH.md):
#
#   For EACH of puffo-agent-core and puffo-agent-cloud, on pypi.org:
#     Account settings → Publishing → "Add a new pending publisher":
#       PyPI project name:  puffo-agent-core      (resp. puffo-agent-cloud)
#       Owner:              puffo-ai
#       Repository name:    puffo-agent
#       Workflow filename:  publish-cloud-pkgs.yml
#       Environment name:   pypi-core             (resp. pypi-cloud)
#   Then in repo Settings → Environments create `pypi-core` and
#   `pypi-cloud` (add a "Required reviewers" rule — a PyPI version can
#   never be re-uploaded, so the approval is the last cheap safety gate),
#   and set the repo variable PUBLISH_PYPI=true.
#
# Each PyPI project binds to exactly ONE (owner + repo + workflow
# filename + environment) tuple, which is why core and cloud get their
# own environment and each publish job uploads only its own package's
# dist dir.

name: Publish cloud packages

on:
  release:
    types: [published]
  workflow_dispatch:

# Least privilege at the top level; each job raises only what it needs.
permissions:
  contents: read

jobs:
  # Build both members once. Downstream jobs reuse these exact bytes via
  # the uploaded artifact rather than rebuilding (so the wheels uploaded
  # to the Release are byte-identical to the ones pushed to PyPI).
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.23"

      # Separate out-dirs so each gated PyPI job can publish exactly one
      # project (gh-action-pypi-publish uploads EVERYTHING in packages-dir).
      - name: Build puffo-agent-core (wheel + sdist) into dist/core
        run: uv build --wheel --sdist --package puffo-agent-core -o dist/core

      - name: Build puffo-agent-cloud (wheel + sdist) into dist/cloud
        run: uv build --wheel --sdist --package puffo-agent-cloud -o dist/cloud

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: cloud-pkg-dist
          path: dist/
          if-no-files-found: error

  # ── Zero-setup path ──────────────────────────────────────────────
  # Attach the wheels + sdists to the GitHub Release. Runs on every
  # published release using only the built-in GITHUB_TOKEN — no PyPI
  # account, no secret, nothing to configure.
  release-assets:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: cloud-pkg-dist
          path: dist

      # softprops/action-gh-release reads github.token (the built-in
      # GITHUB_TOKEN) by default — no external secret is referenced.
      - name: Attach distributions to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/core/*
            dist/cloud/*

  # ── Gated PyPI path ──────────────────────────────────────────────
  # One job per package, one GitHub Environment per package, one
  # packages-dir per package — so each Trusted-Publisher binding only
  # ever sees its own project's files. Inert (SKIPPED, not failed) until
  # vars.PUBLISH_PYPI == 'true' AND the pending publishers + environments
  # have been created.
  pypi-core:
    needs: build
    runs-on: ubuntu-latest
    if: vars.PUBLISH_PYPI == 'true'
    environment:
      name: pypi-core
      url: https://pypi.org/p/puffo-agent-core
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: cloud-pkg-dist
          path: dist

      - name: Publish puffo-agent-core to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/core

  pypi-cloud:
    needs: build
    runs-on: ubuntu-latest
    if: vars.PUBLISH_PYPI == 'true'
    environment:
      name: pypi-cloud
      url: https://pypi.org/p/puffo-agent-cloud
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: cloud-pkg-dist
          path: dist

      - name: Publish puffo-agent-cloud to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/cloud
